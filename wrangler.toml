# Cloudflare Pages config: static app + /api Functions (Fragments' pattern).
# Real bindings minted 2026-07-18 (roadmap step 9); local `wrangler pages dev`
# still simulates them and never touches the live namespace.
name = "hearsay-preview"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "HEARSAY"
id = "0a135109757a4ef9888227d997977809"

# Campaign data lives here since the KV→D1 migration (strongly consistent —
# the eventual-consistency ledger era is over). KV stays bound only through
# the cutover window (auth sessions + the Example Table copy), then retires.
# database_id is the placeholder pattern: minted Rian-side at cutover with
# `wrangler d1 create hearsay`, real id pasted in before deploy.
[[d1_databases]]
binding = "DB"
database_name = "hearsay"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MAPS"
bucket_name = "hearsay-maps"
