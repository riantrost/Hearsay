# Deploys the prototype PWA (app/) to GitHub Pages.
# The app is buildless — this just uploads app/ as the Pages artifact and publishes it.
# Deploys from main (the branch the github-pages environment permits); a push that
# touches app/ or this workflow publishes, and workflow_dispatch re-runs on demand.
name: Deploy Hearsay PWA to Pages

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true creates the Pages site on first run so no manual toggle is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload app/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
