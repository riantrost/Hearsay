<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="ice" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#e8f0f6"/>
      <stop offset="70%" stop-color="#cfdde9"/>
      <stop offset="100%" stop-color="#b3c8da"/>
    </radialGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9fc2d8"/>
      <stop offset="100%" stop-color="#7fa8c4"/>
    </linearGradient>
    <!-- a ruined block: a few collapsed rectangles -->
    <g id="blk">
      <rect x="0" y="0" width="26" height="18" fill="#8195a6" stroke="#5d7183" stroke-width="1.5"/>
      <rect x="30" y="4" width="20" height="14" fill="#8b9fb0" stroke="#5d7183" stroke-width="1.5"/>
      <rect x="8" y="24" width="34" height="12" fill="#75899a" stroke="#5d7183" stroke-width="1.5"/>
    </g>
    <g id="blk2">
      <rect x="0" y="0" width="18" height="26" fill="#8b9fb0" stroke="#5d7183" stroke-width="1.5"/>
      <rect x="22" y="6" width="26" height="16" fill="#7d92a3" stroke="#5d7183" stroke-width="1.5"/>
    </g>
  </defs>

  <rect width="1600" height="1200" fill="url(#ice)"/>

  <!-- frozen river, cracked -->
  <path d="M -20 780 C 300 700, 500 860, 800 780 S 1300 640, 1620 720 L 1620 860 C 1300 780, 1000 920, 700 900 S 200 820, -20 900 Z"
        fill="url(#river)" opacity="0.85"/>
  <g stroke="#e8f2f8" stroke-width="2" opacity="0.7" fill="none">
    <path d="M 180 800 l 90 30 l 70 -18 l 110 34"/>
    <path d="M 620 830 l 80 22 l 60 -30 l 90 26"/>
    <path d="M 1050 760 l 100 18 l 80 -26 l 120 22"/>
  </g>

  <!-- frozen lake -->
  <ellipse cx="270" cy="1030" rx="230" ry="120" fill="url(#river)" opacity="0.8"/>
  <path d="M 150 1000 l 80 26 l 60 -20 l 90 30" stroke="#e8f2f8" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- city wall, breached -->
  <g fill="none" stroke="#4c6274" stroke-width="7" stroke-linecap="round" opacity="0.9">
    <path d="M 420 260 Q 800 130 1180 250"/>
    <path d="M 1240 300 Q 1400 480 1360 660"/>
    <path d="M 1300 740 Q 1220 850 1080 930"/>
    <path d="M 940 970 Q 760 1010 600 960"/>
    <path d="M 500 910 Q 340 800 320 620"/>
    <path d="M 330 520 Q 340 380 390 300"/>
  </g>
  <!-- wall towers -->
  <g fill="#4c6274">
    <circle cx="420" cy="260" r="10"/><circle cx="1180" cy="250" r="10"/>
    <circle cx="1360" cy="660" r="10"/><circle cx="1080" cy="930" r="10"/>
    <circle cx="600" cy="960" r="10"/><circle cx="320" cy="620" r="10"/>
  </g>

  <!-- ruined districts -->
  <g opacity="0.95">
    <use href="#blk" x="520" y="340"/><use href="#blk2" x="600" y="330"/><use href="#blk" x="680" y="360"/>
    <use href="#blk2" x="560" y="410"/><use href="#blk" x="640" y="430"/><use href="#blk2" x="730" y="410"/>
    <use href="#blk" x="850" y="320"/><use href="#blk2" x="930" y="340"/><use href="#blk" x="1000" y="310"/>
    <use href="#blk2" x="880" y="400"/><use href="#blk" x="960" y="420"/><use href="#blk2" x="1050" y="390"/>
    <use href="#blk" x="1130" y="360"/><use href="#blk" x="1160" y="440"/>
    <use href="#blk2" x="440" y="520"/><use href="#blk" x="510" y="550"/><use href="#blk2" x="600" y="530"/>
    <use href="#blk" x="680" y="560"/><use href="#blk2" x="770" y="540"/><use href="#blk" x="860" y="570"/>
    <use href="#blk2" x="950" y="550"/><use href="#blk" x="1040" y="530"/><use href="#blk2" x="1130" y="560"/>
    <use href="#blk" x="1210" y="520"/>
    <use href="#blk2" x="480" y="640"/><use href="#blk" x="560" y="660"/><use href="#blk2" x="660" y="650"/>
    <use href="#blk" x="1150" y="640"/><use href="#blk2" x="1230" y="620"/>
    <use href="#blk" x="640" y="940"/><use href="#blk2" x="730" y="950"/><use href="#blk" x="820" y="930"/>
    <use href="#blk2" x="900" y="950"/><use href="#blk" x="980" y="920"/>
  </g>

  <!-- the citadel -->
  <g transform="translate(800,470)">
    <polygon points="0,-46 14,-14 46,-14 20,6 30,40 0,20 -30,40 -20,6 -46,-14 -14,-14"
             fill="#5d7183" stroke="#3d5266" stroke-width="3"/>
    <circle r="12" fill="#3d5266"/>
  </g>

  <!-- bridges -->
  <g stroke="#4c6274" stroke-width="8" opacity="0.9">
    <line x1="770" y1="770" x2="790" y2="860"/>
    <line x1="1090" y1="740" x2="1110" y2="830"/>
  </g>
  <!-- the shattered span: a broken bridge -->
  <g stroke="#4c6274" stroke-width="8" opacity="0.9">
    <line x1="440" y1="760" x2="452" y2="800"/>
    <line x1="470" y1="845" x2="480" y2="880"/>
  </g>

  <!-- drifting snowfields -->
  <g fill="#f4fafd" opacity="0.65">
    <ellipse cx="600" cy="240" rx="120" ry="26"/>
    <ellipse cx="1250" cy="880" rx="140" ry="30"/>
    <ellipse cx="380" cy="900" rx="100" ry="22"/>
    <ellipse cx="1300" cy="200" rx="110" ry="24"/>
  </g>

  <!-- labels -->
  <g fill="#3d5266" letter-spacing="3" opacity="0.85">
    <text x="800" y="180" font-size="44" text-anchor="middle" letter-spacing="10">THE FROZEN CITY</text>
    <text x="800" y="555" font-size="20" text-anchor="middle" font-style="italic">The Citadel</text>
    <text x="460" y="735" font-size="18" font-style="italic">The Shattered Span</text>
    <text x="1120" y="990" font-size="18" font-style="italic">Dock Quarter</text>
    <text x="270" y="1035" font-size="18" text-anchor="middle" font-style="italic">Mirror Lake</text>
    <text x="980" y="290" font-size="18" font-style="italic">Temple District</text>
    <text x="900" y="800" font-size="20" font-style="italic" opacity="0.8">The Frostrun</text>
  </g>
</svg>
